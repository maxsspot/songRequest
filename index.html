<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
		<title>Page Title</title>
	</head>
	<body onload="bindEvents();checkAllowed();">
		<div id="notAllowed">
			<i class="fa-solid fa-triangle-exclamation fa-4x"></i>
			<h1>Not Allowed</h1>
			<p id="teacherMessage">"<span id="teacherReason"></span>"<br> - Teacher Message</p>
		</div>
		<div id="coverBg">
			<div id="rules">
				<h1>Rules</h1>
				<p>Only request real songs</p>
				<p>Do not spam requests</p>
				<p>Mark explicit songs with an *</p>
				<button id="agreeRules">I Accept These Rules</button>
			</div>
		</div>
		<div id="mainContent">
			<h1>Song Request</h1>
			<div id="shortInputs">
				<input type="number" placeholder="Period" id="classPeriod" class="requestInput" />
				<input type="number" placeholder="Grade" id="gradeLevel" class="requestInput" />
			</div>
			<input maxlength="80" placeholder="Artist Name" id="songArtist" class="requestInput"><br>
			<input maxlength="60" placeholder="Song Name" id="songName" class="requestInput"><br><br>
			<button id="requestSongs">Request Song</button>
		</div>
		<sub id="rulesAlert">By using this site, you agree to follow <span id="linkRules">these rules</span>.</sub>
	</body>
</html>

<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
		<script src="https://cdn.jsdelivr.net/npm/profanity-cleaner@0.0.3/dist/profanity-cleaner.min.js"></script>
		<script type = "module" src="firebaseConfig.js"></script>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Gym Class Song Request - Requests</title>
	</head>
	<body>
		<br>
		
		<h1>SONG REQUESTS</h1>
		
		<br><br>
		
		<h2>Grade 9</h2>
		<textarea id = "grade9requests"></textarea>
		
		<br><br><br><br><br><br><br><br>
		
		<h2>Grade 10</h2>
		<textarea id = "grade10requests"></textarea>
		
		<br><br><br><br><br><br><br><br>
		
		<h2>Grade 11</h2>
		<textarea id = "grade11requests"></textarea>
		
		<br><br><br><br><br><br><br><br>
			
		<h2>Grade 12</h2>
		<textarea id = "grade12requests"></textarea>
		
		<br><br>
		<style>
		* {
		    margin:0;
		    padding:0;
		    outline:none;
		    font-family:"Lato", sans-serif;
		    transition:all 0.5s;
		}
		
		body {
		    background-color:whitesmoke;
		    text-align:center;
		}

		#grade9requests, #grade10requests, #grade11requests, #grade12requests {
		    padding:10px;
		    border:grey solid 1px;
		    border-radius:10px;
		    width:300px;
		    height:200px;
		    resize:none;
		}
		</style>

		
		<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
		import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
		
		const firebaseConfig = {
		  apiKey: "AIzaSyAMHdGoXT1dPH1d0YqMVsTXwY583tbpvQU",
		  authDomain: "song-request-2dde2.firebaseapp.com",
		  databaseURL: "https://song-request-2dde2-default-rtdb.firebaseio.com/",
		  projectId: "song-request-2dde2",
		  storageBucket: "song-request-2dde2.appspot.com",
		  messagingSenderId: "1050997422155",
		  appId: "1:1050997422155:web:8f1a7b1e36d40ee56b75ce"
		};
		
		const app = initializeApp(firebaseConfig);
		const database = getDatabase(app);
		
		export { database };

		const ninthGrade = ref(database, "Song Requests/" + "Grade 9");
		const tenthGrade = ref(database, "Song Requests/" + "Grade 10");
		const eleventhGrade = ref(database, "Song Requests/" + "Grade 11");
		const twelfthGrade = ref(database, "Song Requests/" + "Grade 12");

		
		function displayRequests(gradeRef, gradeElementId) {
		  onValue(gradeRef, (snapshot) => {
		    if (snapshot.exists()) {
		      const data = snapshot.val();
		      const gradeRequestsElement = document.getElementById(gradeElementId);
		      let requestsText = "";
		
		      for (let key in data) {
		        requestsText += data[key].request + "\n\n";
		      }
		
		      if (gradeRequestsElement) {
		        gradeRequestsElement.value = requestsText;
		      }
		    }
		  });
		}
		
		displayRequests(ninthGrade, "grade9requests");
		displayRequests(tenthGrade, "grade10requests");
		displayRequests(eleventhGrade, "grade11requests");
		displayRequests(twelfthGrade, "grade12requests");
		</script>
	</body>
</html>

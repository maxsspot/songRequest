<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="requests.css">
        <title>Song Request</title>
    </head>
    <body onload="attatchEvents();checkAccess()">
        <div id="passwordArea">
            <h1>Enter Password</h1>
            <input placeholder="Password" type="password" id="password" />
            <button id="submitPass" class="blueButton">Log In</button>
        </div>
        <div id="coverBg">
            <div id="banArea">
                <br>
                <h1>Ban User</h1>
                <input class="banInput" placeholder="Ban this ID" id="userId" />
                <textarea class="banInput" placeholder="Leave a message on why you banned this user... (this field is optional)" id="banMessage"></textarea><br><br>
                <button id="closeBan" class="blueButton">Cancel</button>
                <button id="finalize" class="redButton">Ban User</button>
            </div>
        </div>
        <div id="mainContent">
            <h1>Request Area</h1>
            <select id="gradeLevel" class="selectBox">
                <option value="9">Grade 9</option>
                <option value="10">Grade 10</option>
                <option value="11">Grade 11</option>
                <option value="12">Grade 12</option>
            </select>
            <select id="classPeriod" class="selectBox">
                <option value="1">Period 1</option>
                <option value="2">Period 2</option>
                <option value="3">Period 3</option>
                <option value="4">Period 4</option>
                <option value="5">Period 5</option>
                <option value="6">Period 6</option>
                <option value="7">Period 7</option>
            </select><br><br>
            <textarea id="requestZone"></textarea>
        </div>
        <button id="banStudent" class="blueButton">Ban Student</button>
        <script src="requests.js"></script>
    </body>
</html>
